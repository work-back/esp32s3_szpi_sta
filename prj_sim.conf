# lyj config
CONFIG_WIFI_STA_EN=n


CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=65536

CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_POSIX_API=y
CONFIG_EVENTFD=y

# Crypto Base for websocket
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_MD_C=y

# 针对新版本/PSA 架构 for websocket
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_PSA_WANT_ALG_SHA_1=y

# 内存
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192

CONFIG_HEAP_MEM_POOL_SIZE=98304

CONFIG_ZVFS_EVENTFD_MAX=5
#CONFIG_ZVFS_OPEN_MAX=10
#CONFIG_POSIX_MAX_FDS=10


######################################
#           for BLE                  #
######################################
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="小米蓝牙语音遥控器"
CONFIG_BT_DEVICE_APPEARANCE=384

CONFIG_BT_SMP=y

CONFIG_UART_NATIVE_PTY_0_ON_STDINOUT=y
CONFIG_SHELL=y
CONFIG_BT_SHELL=y

CONFIG_BT_L2CAP_TX_BUF_COUNT=10


CONFIG_BT_DIS=y
CONFIG_BT_DIS_PNP=y
CONFIG_BT_DIS_PNP_VID_SRC=1
CONFIG_BT_DIS_PNP_VID=0x2717
CONFIG_BT_DIS_PNP_PID=0x32b8
CONFIG_BT_DIS_PNP_VER=0x0011

CONFIG_BT_RX_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_BUF_ACL_TX_COUNT=12
CONFIG_BT_BUF_EVT_RX_COUNT=16

CONFIG_BT_HCI_ACL_FLOW_CONTROL=n
CONFIG_BT_BUF_ACL_RX_SIZE=4096
CONFIG_BT_BUF_ACL_TX_SIZE=4096


CONFIG_JSON_LIBRARY=y

